name: Run unit tests

on:
  push:
    paths:
      - "custom_components/solis_cloud_monitoring/**"
      - "tests/**"
      - ".github/workflows/tests.yml"
  pull_request:
    paths:
      - "custom_components/solis_cloud_monitoring/**"
      - "tests/**"
      - ".github/workflows/tests.yml"

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test runner
        run: python -m pip install pytest
      - name: Run tests
        run: pytest -q
